      background-color: black;

      padding: 10px 20px;

      background-color: #003300;
    }
  </style>

<body>

<div id="terminal">> system ready</div>
<button onclick="start()">avvia dad.exe</button>

<script>
const lines = [
  "> initializing dad.exe...",
  "> loading memories...",
  "> checking patience... OK",
  "> compiling love...",
  "> injecting dad jokes...",
  "> status: LEGEND",
  "",
  "> output:",
  "> Ti voglio bene <3"
];

function typeLine(text, delay) {
  return new Promise(resolve => {
    setTimeout(() => {
      document.getElementById("terminal").innerHTML += "\n" + text;
      resolve();
    }, delay);
  });
}

async function start() {
  document.querySelector("button").disabled = true;

  for (let i = 0; i < lines.length; i++) {
    await typeLine(lines[i], 800);
  }
}
</script>

</body>
</html>
