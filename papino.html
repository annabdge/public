<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>papino.exe</title>
  <style>
    body {
      margin: 0;
      background-color: black;
      color: #00ff00;
      font-family: "Courier New";

      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      max-width: 600px;
      text-align: center;
    }

    #terminal {
      text-align: left;
      font-size: 16px;
      min-height: 150px;
    }

    button:hover {
      background-color: #003300;
    }
    /* per telefono */
    @media (max-width: 480px) {
      #terminal {
        font-size: 14px;
      }

      button {
        font-size: 14px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div id="terminal">> system ready</div>
  <button onclick="start()">avvia papino.exe</button>
</div>

<script>
const lines = [
  "> initializing papino.exe...",
  "> messaggio per Andrea Berti",
  "> detto papà, pà, papi, papino, andre ...",
  "> ... ma anche",
  "> ... uber, mi ricarichi la carta?, mi metti l'arnica",
  "",
  "> output:",
  "> Ti vogliamo bene <3", 
  "",
  "> Anna (e elena)", 
  
];

function typeLine(testo, delay) {
  return new Promise(resolve => {
    setTimeout(() => {
      document.getElementById("terminal").innerHTML += "\n" + testo;
      resolve();
    }, delay);
  });
}

async function start() {
  document.querySelector("button").disabled = true;
  for (let i = 0; i < lines.length; i++) {
    await typeLine(lines[i], 800);
  }
}
</script>

</body>
</html>
